name: Build WebView APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Mobile Project
      run: |
        cordova create myApp com.foljgram.chat FoljGram
        cd myApp
        cordova platform add android
        # Копируем твой index.html внутрь мобильного приложения
        rm -rf www/*
        cp ../index.html www/index.html

    - name: Build Android APK
      run: |
        cd myApp
        cordova build android --device

    - name: Upload Finished APK File
      uses: actions/upload-artifact@v4
      with:
        name: FoljGram_Mobile_App
        path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
